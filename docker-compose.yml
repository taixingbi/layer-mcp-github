# MCP streamable-http. Pass secrets via env_file (never bake .env into the image).
services:
  mcp-github:
    image: layer-mcp-github-v1
    build: .
    container_name: layer-mcp-github-v1
    restart: unless-stopped
    labels:
      com.layer.service: layer-mcp-github-v1
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
